name: CI

on:
  push:
    branches: [ main, deployment ]
  pull_request:
    branches: [ main, deployment ]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build & unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile
        run: mvn -B -ntp clean compile

      # Runs the fast, DB-free unit tests (*ServiceTest). The @SpringBootTest
      # context test needs a live MySQL and is excluded from CI for now.
      - name: Unit tests
        run: mvn -B -ntp test -Dtest='*ServiceTest' -DfailIfNoTests=false

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  docker:
    name: Docker images (build, and publish on main)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: read
      packages: write
    env:
      # GHCR image paths must be lowercase; repository_owner is already lowercase here.
      IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/taskmanagement
      # Publish only on a push to main; PRs and other branches build for validation only.
      PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to GitHub Container Registry only when we intend to publish.
      - name: Log in to GHCR
        if: ${{ env.PUSH == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Backend: multi-stage build (mvn package) → publish on main, validate elsewhere.
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ env.PUSH == 'true' }}
          tags: ${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # Frontend: production ng build + nginx.
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ env.PUSH == 'true' }}
          tags: ${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # AI sidecar: LangChain.js + Gemini.
      - name: Build ai-service image
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          push: ${{ env.PUSH == 'true' }}
          tags: ${{ env.IMAGE_PREFIX }}-ai-service:latest
          cache-from: type=gha,scope=ai-service
          cache-to: type=gha,mode=max,scope=ai-service
