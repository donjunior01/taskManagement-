<div class="register-container">
  <div class="background-decor">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
  </div>

  <div class="register-card glass-panel animate-scale-in" [class.shake-element]="errorMessage">
    <div class="brand-header">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1>ApexTask</h1>
      <p class="brand-subtitle">Streamlined Enterprise Task Workspace</p>
    </div>

    <h2 class="form-title">Create Account</h2>
    
    @if (errorMessage) {
      <div class="error-alert animate-fade-in-up">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="alert-icon">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span class="alert-text">{{ errorMessage }}</span>
      </div>
    }

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="register-form">
      <div class="form-row">
        <div class="form-group" [class.has-error]="firstNameInput.invalid && (firstNameInput.dirty || firstNameInput.touched)">
          <label for="firstName">First Name</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </span>
            <input 
              type="text" 
              id="firstName" 
              [(ngModel)]="registerRequest.firstName" 
              name="firstName" 
              #firstNameInput="ngModel"
              required 
              placeholder="First name"
            />
          </div>
        </div>

        <div class="form-group" [class.has-error]="lastNameInput.invalid && (lastNameInput.dirty || lastNameInput.touched)">
          <label for="lastName">Last Name</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </span>
            <input 
              type="text" 
              id="lastName" 
              [(ngModel)]="registerRequest.lastName" 
              name="lastName" 
              #lastNameInput="ngModel"
              required 
              placeholder="Last name"
            />
          </div>
        </div>
      </div>
      
      <div class="form-group" [class.has-error]="usernameInput.invalid && (usernameInput.dirty || usernameInput.touched)">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </span>
          <input 
            type="text" 
            id="username" 
            [(ngModel)]="registerRequest.username" 
            name="username" 
            #usernameInput="ngModel"
            required 
            placeholder="Choose a username"
          />
        </div>
      </div>
      
      <div class="form-group" [class.has-error]="emailInput.invalid && (emailInput.dirty || emailInput.touched)">
        <label for="email">Corporate Email</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
          </span>
          <input 
            type="email" 
            id="email" 
            [(ngModel)]="registerRequest.email" 
            name="email" 
            #emailInput="ngModel"
            required 
            email
            placeholder="name@company.com"
          />
        </div>
      </div>
      
      <div class="form-group" [class.has-error]="passwordInput.invalid && (passwordInput.dirty || passwordInput.touched)">
        <label for="password">Security Password</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </span>
          <input 
            type="password" 
            id="password" 
            [(ngModel)]="registerRequest.password" 
            name="password" 
            #passwordInput="ngModel"
            required
            minlength="4"
            placeholder="••••••••"
          />
        </div>
      </div>
      
      <button type="submit" [disabled]="loading || registerForm.invalid" class="register-button">
        @if (loading) {
          <span class="spinner"></span>
          <span>Registering...</span>
        } @else {
          <span>Create Account</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-arrow">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        }
      </button>
    </form>
    
    <div class="card-footer">
      <p>Already have an account? <a routerLink="/login" class="login-link">Sign In</a></p>
    </div>
  </div>
</div>
