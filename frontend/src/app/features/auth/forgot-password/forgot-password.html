<div class="forgot-password-container">
  <div style="position:fixed;top:18px;right:18px;z-index:50;"><app-lang-toggle></app-lang-toggle></div>
  <div class="forgot-password-card">
    <h1>{{ (branding.branding$ | async)?.appName || 'TaskMaster Pro' }}</h1>
    <h2>{{ 'auth.fpTitle' | translate }}</h2>
    
    @if (message) {
      <div class="success-message">
        {{ message }}
      </div>
    }
    
    @if (errorMessage) {
      <div class="error-message">
        {{ errorMessage }}
      </div>
    }
    
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">{{ 'auth.email' | translate }}</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          required
          [placeholder]="'auth.phEnterEmail' | translate"
        />
      </div>

      <button type="submit" [disabled]="loading" class="submit-button">
        @if (loading) {
          <span>{{ 'auth.sending' | translate }}</span>
        } @else {
          <span>{{ 'auth.sendResetLink' | translate }}</span>
        }
      </button>
    </form>

    <p class="login-link">
      {{ 'auth.rememberPassword' | translate }} <a routerLink="/login" class="login-link">{{ 'auth.signIn' | translate }}</a>
    </p>
  </div>
</div>
