@if (isVisible) {
  <div class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Error</h3>
        <button (click)="hide()" class="close-button">&times;</button>
      </div>
      <div class="modal-body">
        <p>{{ message }}</p>
      </div>
      <div class="modal-footer">
        <button (click)="hide()" class="close-btn">OK</button>
      </div>
    </div>
  </div>
}
