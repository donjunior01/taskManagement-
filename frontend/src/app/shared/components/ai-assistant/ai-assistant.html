<!-- Floating launcher -->
<button class="ai-fab" [class.open]="isOpen" (click)="toggle()" [title]="isOpen ? 'Close assistant' : 'Ask the AI assistant'">
  <svg *ngIf="!isOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    <line x1="9" y1="10" x2="15" y2="10"></line>
    <line x1="9" y1="13" x2="13" y2="13"></line>
  </svg>
  <svg *ngIf="isOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="18" y1="6" x2="6" y2="18"></line>
    <line x1="6" y1="6" x2="18" y2="18"></line>
  </svg>
</button>

<!-- Chat panel -->
<div class="ai-panel" *ngIf="isOpen">
  <div class="ai-panel-header">
    <div class="ai-id">
      <span class="ai-avatar">AI</span>
      <div class="ai-id-text">
        <strong>TaskFlow Assistant</strong>
        <span>Projects, tasks & guidance</span>
      </div>
    </div>
    <button class="ai-clear" (click)="clear()" title="Clear conversation" *ngIf="messages.length">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
    </button>
  </div>

  <div class="ai-messages" #scrollArea>
    <!-- Welcome / empty state -->
    <div class="ai-welcome" *ngIf="messages.length === 0">
      <p>Hi! I can answer questions about your projects and tasks, help write descriptions, and guide you through your work.</p>
      <div class="ai-suggestions">
        <button *ngFor="let s of suggestions" (click)="useSuggestion(s)">{{ s }}</button>
      </div>
    </div>

    <div class="ai-msg" *ngFor="let m of messages" [class.ai]="m.isAi" [class.user]="!m.isAi">
      <div class="ai-bubble">{{ m.text }}</div>
    </div>

    <div class="ai-msg ai" *ngIf="loading">
      <div class="ai-bubble ai-typing"><span></span><span></span><span></span></div>
    </div>
  </div>

  <form class="ai-input" (submit)="send(); $event.preventDefault()">
    <input type="text" placeholder="Ask anything about your work…" [(ngModel)]="userInput" name="aiInput" autocomplete="off" [disabled]="loading" />
    <button type="submit" [disabled]="loading || !userInput.trim()" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </form>
</div>
