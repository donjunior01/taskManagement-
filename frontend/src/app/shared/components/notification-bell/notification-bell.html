<div class="notification-bell">
  <button (click)="toggleNotifications()" class="bell-button">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
    </svg>
    @if (unreadCount > 0) {
      <span class="badge">{{ unreadCount }}</span>
    }
  </button>

  @if (showNotifications) {
    <div class="notification-dropdown">
      <div class="notification-header">
        <h4>{{ 'notif.title' | translate }}</h4>
      </div>
      @if (notifications.length === 0) {
        <p class="no-notifications">{{ 'notif.empty' | translate }}</p>
      } @else {
        <ul class="notification-list">
          <li *ngFor="let notif of notifications" class="notification-item" [ngClass]="{'unread': !notif.isRead}">
            <div class="notif-content">
              <span class="notif-message">{{ dispMsg(notif) }}</span>
              <span class="notif-time">{{ notif.createdAt | date:'shortTime' }}</span>
            </div>
            <button class="delete-btn" (click)="deleteNotification(notif.id, $event)">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </li>
        </ul>
      }
    </div>
  }
</div>
