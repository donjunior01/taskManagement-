# Application Configuration
spring.application.name=gpiApp

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/project_management?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.implicit_naming_strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false

# SQL Initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# File Upload Configuration
# Hard servlet ceiling (must be >= the admin-configurable per-upload limit). The effective limit is
# enforced in FileUploadController from SystemSettings.maxFileUploadMb (default 100 MB).
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
app.upload.dir=uploads
app.upload.max-size=104857600

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.check-template=true
spring.thymeleaf.check-template-location=true

# JWT Configuration
jwt.secret=${JWT_SECRET:MTNCameroonTaskManagementSystemSecretKey2024SecureToken}
jwt.expiration=86400

# Email Configuration
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=*
# Fail fast instead of hanging when the SMTP host is unreachable/misconfigured.
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.from=${MAIL_FROM:noreply@taskmanagement.com}
app.email.enabled=${EMAIL_ENABLED:false}

# Brevo transactional email (REST API). When BREVO_API_KEY is set, all email is sent via Brevo,
# regardless of the SMTP settings above. The sender MUST be a verified sender (or on an
# authenticated domain) in your Brevo account, otherwise delivery is rejected.
brevo.api.key=${BREVO_API_KEY:}
brevo.sender.email=${BREVO_SENDER_EMAIL:${MAIL_FROM:noreply@taskmanagement.com}}
brevo.sender.name=${BREVO_SENDER_NAME:TaskMaster Pro}

# Google Calendar Configuration
google.calendar.enabled=${GOOGLE_CALENDAR_ENABLED:false}
google.calendar.credentials.file=${GOOGLE_CREDENTIALS_FILE:classpath:google-credentials.json}
google.calendar.id=${GOOGLE_CALENDAR_ID:primary}

# Server Configuration — PORT is injected by PaaS platforms; defaults to 8073 (docker-compose/local).
server.port=${PORT:8073}

# Actuator / Monitoring (CDC Lot 4)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
# Mail SMTP is optional/best-effort here — don't let an unreachable mail server mark the app DOWN.
management.health.mail.enabled=false
management.info.env.enabled=true
info.app.name=Task Management System
info.app.version=1.0.0

# AI Assistant — powered by the LangChain.js + Gemini sidecar microservice (see ai-service/).
# AI_SERVICE_URL points the backend at the sidecar; the Gemini API key lives in the sidecar
# (ai-service/.env or docker-compose), never here. Without the sidecar, the assistant falls back
# to its deterministic, data-grounded rule-based engine. See ai-service/README.md.
ai.service.url=${AI_SERVICE_URL:http://localhost:8090}
ai.service.timeout-ms=25000

# Static resources
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.example.gpiApp=DEBUG
logging.level.org.springframework.jdbc.datasource.init=DEBUG

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# Swagger / OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# --- Multi-tenancy isolation enforcement (SECURITY-CRITICAL) ---
# OFF by default. Only set true after running a multi-organization isolation test,
# otherwise enforcement bugs could expose cross-tenant data.
app.multitenancy.enforce=false

# --- SSO (OIDC) --- off unless a provider is configured below.
# To enable: set app.sso.enabled=true and provide a registration, e.g.:
#   spring.security.oauth2.client.registration.oidc.client-id=...
#   spring.security.oauth2.client.registration.oidc.client-secret=...
#   spring.security.oauth2.client.registration.oidc.scope=openid,email,profile
#   spring.security.oauth2.client.provider.oidc.issuer-uri=https://your-idp/.well-known/...
app.sso.enabled=false
# Where to send the browser after a successful SSO login (frontend route that reads ?token=).
app.sso.redirect-uri=http://localhost:4200/auth/sso-callback
