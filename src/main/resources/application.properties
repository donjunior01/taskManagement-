# Application Configuration
spring.application.name=gpiApp

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/project_management?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.implicit_naming_strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false

# SQL Initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads
app.upload.max-size=10485760

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.check-template=true
spring.thymeleaf.check-template-location=true

# JWT Configuration
jwt.secret=${JWT_SECRET:MTNCameroonTaskManagementSystemSecretKey2024SecureToken}
jwt.expiration=86400

# Email Configuration
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.from=${MAIL_FROM:noreply@taskmanagement.com}
app.email.enabled=${EMAIL_ENABLED:false}

# Google Calendar Configuration
google.calendar.enabled=${GOOGLE_CALENDAR_ENABLED:false}
google.calendar.credentials.file=${GOOGLE_CREDENTIALS_FILE:classpath:google-credentials.json}
google.calendar.id=${GOOGLE_CALENDAR_ID:primary}

# Server Configuration
server.port=8073

# Actuator / Monitoring (CDC Lot 4)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
# Mail SMTP is optional/best-effort here — don't let an unreachable mail server mark the app DOWN.
management.health.mail.enabled=false
management.info.env.enabled=true
info.app.name=Task Management System
info.app.version=1.0.0

# OpenAI API (AI Assistant primary provider)
# Mirrors seruca's approach: GPT-4o is the primary model. The API key is read from the OPENAI_API_KEY
# environment variable. When absent or when a call fails, the assistant falls back to Claude, then Gemini,
# then the rule-based engine. This provides robust, region-independent coverage.
# NOTE: never commit the API key — set OPENAI_API_KEY in your environment.
openai.api.key=${OPENAI_API_KEY:}
openai.api.base-url=https://api.openai.com/v1
openai.api.model=gpt-4o
openai.api.max-tokens=1024
openai.api.timeout-ms=20000

# Anthropic Claude API (AI Assistant secondary provider)
# The API key is read from the ANTHROPIC_API_KEY environment variable and is never committed.
# When the key is absent or a call fails, the AI assistant falls back to Gemini, then rule-based engine.
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.base-url=https://api.anthropic.com
anthropic.api.version=2023-06-01
anthropic.api.model=claude-haiku-4-5
anthropic.api.max-tokens=1024
anthropic.api.timeout-ms=20000

# Google Gemini API (AI Assistant fallback provider).
# Mirrors the seruca project: a default key is baked in so the assistant works out of the
# box, but it can be overridden with the GEMINI_API_KEY environment variable. The assistant
# tries OpenAI first, then Claude, then Gemini, then the deterministic rule-based engine.
# This provides robust, multi-provider coverage with graceful fallback.
# NOTE: a committed key is convenient but not secure for production — rotate/override via env.
gemini.api.key=${GEMINI_API_KEY:AIzaSyAVj6xyMK4vPVRz7mXHkcJyNGT_uLPbD04}
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta/models
gemini.api.models=gemini-2.0-flash,gemini-2.5-flash,gemini-2.0-flash-lite
gemini.api.timeout-ms=20000

# Static resources
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.example.gpiApp=DEBUG
logging.level.org.springframework.jdbc.datasource.init=DEBUG

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# Swagger / OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
